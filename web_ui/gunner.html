<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gunner Console</title>
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.9/lib/eventemitter2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        body { background-color: #111; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; }
        .video-frame { border: 3px solid #0f0; border-radius: 8px; width: 100%; max-width: 640px; background: #000; margin-bottom: 15px; }
        .control-panel { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 10px; padding: 10px; background: #222; border-radius: 8px; }
        .btn { padding: 12px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: white; flex-grow: 1; }
        .btn-auto { background-color: #007bff; }
        .btn-manual { background-color: #dc3545; }
        .btn-fire { background-color: #ff8c00; font-size: 20px; width: 100%; margin-top: 10px; }
        .slider-group { width: 45%; text-align: left; }
        input[type="range"] { width: 100%; }
        #status { color: yellow; font-weight: bold; }
        #gamepad-info { color: #0f0; font-family: monospace; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎯 GUNNER SYSTEM</h2>
        <p id="status">ROS 2 接続待機中...</p>

        <img id="camera-stream" class="video-frame" alt="映像シグナルなし">

        <div class="control-panel">
            <button class="btn btn-auto" id="btn-aim-mode" onclick="toggleAimMode()">エイム: 自動 (AI)</button>
            <button class="btn btn-manual" id="btn-fire-mode" onclick="toggleFireMode()">発射: 手動</button>

            <div class="slider-group">
                <label>露出 (Exposure): <span id="val-exp">30</span></label>
                <input type="range" id="slider-exp" min="1" max="200" value="30" onchange="setCameraParam('rgb_camera.exposure', this.value)">
            </div>
            <div class="slider-group">
                <label>ゲイン (Gain): <span id="val-gain">0</span></label>
                <input type="range" id="slider-gain" min="0" max="100" value="0" onchange="setCameraParam('rgb_camera.gain', this.value)">
            </div>

            <button class="btn btn-fire" onclick="fireCommand()">🔥 手動発射 (FIRE) 🔥</button>
        </div>

        <div id="gamepad-info">🎮 コントローラー未接続</div>
    </div>

    <script>
        // ==========================================
        // 1. IPアドレスの自動取得とURL設定
        // ==========================================
        const robotIP = window.location.hostname || "localhost";
        
        // 映像ストリーミングのURLを自動セット (MJPEG形式で超低遅延)
        const streamUrl = `http://${robotIP}:8080/stream?topic=/yolo/annotated_image&type=mjpeg&quality=45`;
        document.getElementById('camera-stream').src = streamUrl;

        // ROS 2 WebSocketへの接続
        const ros = new ROSLIB.Ros({ url : `ws://${robotIP}:9090` });

        ros.on('connection', () => { 
            document.getElementById('status').innerText = "✅ システムオンライン"; 
            document.getElementById('status').style.color = "lime"; 
        });
        ros.on('error', () => { document.getElementById('status').innerText = "❌ 通信エラー"; });
        ros.on('close', () => { document.getElementById('status').innerText = "⚠️ 接続切断"; });

        // ==========================================
        // 2. ROS 2 トピックとサービスの定義
        // ==========================================
        // 砲塔手動操作用ジョイスティック
        const joyGunnerTopic = new ROSLIB.Topic({ ros: ros, name: '/joy_gunner', messageType: 'sensor_msgs/msg/Joy' });
        // モード切替用フラグ (std_msgs/String)
        const aimModeTopic = new ROSLIB.Topic({ ros: ros, name: '/turret/aim_mode', messageType: 'std_msgs/msg/String' });
        const fireModeTopic = new ROSLIB.Topic({ ros: ros, name: '/turret/fire_mode', messageType: 'std_msgs/msg/String' });
        // 発射コマンド
        const fireCmdTopic = new ROSLIB.Topic({ ros: ros, name: '/turret/fire_cmd', messageType: 'std_msgs/msg/Empty' });

        // カメラパラメータ変更サービス (RealSense用)
        const setParamClient = new ROSLIB.Service({
            ros: ros,
            name: '/camera/camera/set_parameters',
            serviceType: 'rcl_interfaces/srv/SetParameters'
        });

        // ==========================================
        // 3. UIのボタンアクション
        // ==========================================
        let isAutoAim = true;
        function toggleAimMode() {
            isAutoAim = !isAutoAim;
            const btn = document.getElementById('btn-aim-mode');
            btn.innerText = isAutoAim ? "エイム: 自動 (AI)" : "エイム: 手動 (JOY)";
            btn.className = isAutoAim ? "btn btn-auto" : "btn btn-manual";
            aimModeTopic.publish(new ROSLIB.Message({ data: isAutoAim ? "auto" : "manual" }));
        }

        let isAutoFire = false;
        function toggleFireMode() {
            isAutoFire = !isAutoFire;
            const btn = document.getElementById('btn-fire-mode');
            btn.innerText = isAutoFire ? "発射: 自動 (2秒毎)" : "発射: 手動";
            btn.className = isAutoFire ? "btn btn-auto" : "btn btn-manual";
            fireModeTopic.publish(new ROSLIB.Message({ data: isAutoFire ? "auto" : "manual" }));
        }

        function fireCommand() {
            fireCmdTopic.publish(new ROSLIB.Message({})); // 空のメッセージを送る
            console.log("発射コマンド送信！");
        }

        // ==========================================
        // 4. スライダーでカメラ露出・ゲインを変更
        // ==========================================
        function setCameraParam(paramName, value) {
            const intValue = parseInt(value);
            // 表示の更新
            if (paramName.includes("exposure")) document.getElementById('val-exp').innerText = intValue;
            if (paramName.includes("gain")) document.getElementById('val-gain').innerText = intValue;

            // ROS 2のパラメータサービス形式を作成して送信
            const request = new ROSLIB.ServiceRequest({
                parameters: [{
                    name: paramName,
                    value: { type: 2, integer_value: intValue } // type:2 は Integer
                }]
            });
            setParamClient.callService(request, (result) => {
                console.log(`${paramName} を ${intValue} に変更しました`);
            });
        }

        // ==========================================
        // 5. PS4コントローラーの読み取りループ
        // ==========================================
        function updateGamepad() {
            const gamepads = navigator.getGamepads();
            if (gamepads[0]) {
                const gp = gamepads[0];
                // 例: 右スティックの左右(axes[2])と上下(axes[3])を砲塔の旋回・上下に割り当て
                const yaw = -gp.axes[2]; 
                const pitch = -gp.axes[3]; 

                document.getElementById('gamepad-info').innerText = `砲塔制御 -> YAW: ${yaw.toFixed(2)} | PITCH: ${pitch.toFixed(2)}`;

                const joyMsg = new ROSLIB.Message({
                    axes: [0.0, 0.0, yaw, pitch, 0.0, 0.0], // 0,1は足回り用なので0を入れる
                    buttons: Array.from(gp.buttons).map(b => b.pressed ? 1 : 0)
                });
                joyGunnerTopic.publish(joyMsg);
            }
            requestAnimationFrame(updateGamepad);
        }
        updateGamepad(); // ループ開始
    </script>
</body>
</html>
